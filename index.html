<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- 浏览器标签上会显示的标题 -->
    <title>王冠东的小世界 🎵</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            /* 柔和的渐变背景 */
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            font-family: "微软雅黑", sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-align: center;
        }
        .container {
            background: rgba(255, 255, 255, 0.85);
            padding: 40px 60px;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(31, 38, 135, 0.15);
            backdrop-filter: blur(4px);
        }
        h1 {
            color: #2c3e50;
            font-size: 36px;
            margin-bottom: 20px;
        }
        p {
            color: #34495e;
            font-size: 20px;
            margin-bottom: 10px;
            line-height: 1.6;
        }
        .emoji {
            font-size: 24px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>👋 你好，我是王冠东！</h1>
        <p class="emoji">🎻 美声演唱爱好者 | 古筝玩家 | 音乐学习者</p>
        <p>这是我亲手做的第一个网站，超有成就感！✨</p>
        <p>欢迎来到我的音乐小天地~</p>
    </div>
</body>
</html>
